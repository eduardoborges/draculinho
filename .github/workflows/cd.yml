name: CD

on:
  release:
    types:
      - "published"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.event.release.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Mise (Node + pnpm)
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Get pnpm store path
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VSIX
        run: pnpm run build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ./dist/draculinho-${{ env.VERSION }}.vsix

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: build
    environment:
      name: vscode
      url: https://marketplace.visualstudio.com/items?itemName=eduardoborges.draculinho
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.event.release.tag_name }}
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Mise (Node)
        uses: jdx/mise-action@v3

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_TOKEN }} -i ./draculinho-${VERSION}.vsix

  publish-openvsx:
    name: Publish to Open VSX (Cursor)
    needs: build
    environment:
      name: openvsx
      url: https://open-vsx.org/api/eduardoborges/draculinho
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.event.release.tag_name }}
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Setup Mise (Node)
        uses: jdx/mise-action@v3

      - name: Create Open VSX namespace (if not exists)
        run: npx ovsx create-namespace eduardoborges -p ${{ secrets.OPENVSX_TOKEN }}
        continue-on-error: true

      - name: Publish to Open VSX (Cursor)
        run: npx ovsx publish ./draculinho-${VERSION}.vsix -p ${{ secrets.OPENVSX_TOKEN }}
