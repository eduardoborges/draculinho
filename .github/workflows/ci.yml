name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - edited

jobs:
  check_sv:
    name: Check Semantic Version PR
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate semantic PR title
        uses: amannn/action-semantic-pull-request@v5
